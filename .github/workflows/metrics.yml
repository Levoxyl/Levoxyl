name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          config_output: svg
          user: Levoxyl
          template: repository
          config_timezone: Europe/Sofia
          
          # Plugins
          
          plugin_leetcode: yes
          plugin_leetcode_user: jaranaharbakar
          plugin_leetcode_sections: solved
          
          plugin_rss: yes
          plugin_rss_limit: 4
          plugin_rss_source: https://phys.org/rss-feed/breaking/physics-news/quantum-physics/
          
          plugin_fortune: yes
          
          config_order: leetcode.solved, rss
